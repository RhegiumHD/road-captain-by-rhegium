<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Road Captain by Rhegium</title><link rel="stylesheet" href="style.css"></head><body><main class="shell"><header><div><span class="eyebrow">private route planner</span><h1>Road Captain <b>by Rhegium</b></h1></div><button id="garageToggle">Garage</button></header><section class="hero"><textarea id="natural" placeholder="Scrivi il viaggio: devo partire da... arrivare a... voglio arrivare alle..."></textarea><button id="parseExample">Compila esempio</button></section><section class="grid"><div class="card form"><h2>Viaggio</h2><label>Partenza<input id="start" list="startList" placeholder="Area di servizio Villa San Giovanni Est"></label><datalist id="startList"></datalist><label>Arrivo<input id="end" list="endList" placeholder="Toscana Village, Via Fornoli 9"></label><datalist id="endList"></datalist><div class="twocol"><label>Data<input id="date" type="date"></label><label>Ora<input id="time" type="time" value="20:00"></label></div><label>Studio itinerario<select id="mode"><option value="arrival">Arrivo alle ore indicate</option><option value="departure">Partenza alle ore indicate</option></select></label><div class="twocol"><label>Autonomia max km<input id="autonomy" type="number" value="200"></label><label>Sosta ogni km<input id="stopEvery" type="number" value="150"></label></div><div class="twocol"><label>Finestra avanti km<input id="forward" type="number" value="25"></label><label>Consumo km/l<input id="consumption" type="number" value="13" step="0.1"></label></div><div class="twocol"><label>Prezzo carburante €/l<input id="fuelPrice" type="number" value="1.85" step="0.001"></label><label>Minuti sosta pieno<input id="stopMinutes" type="number" value="15"></label></div><button id="plan">Calcola viaggio</button></div><div class="card dashboard"><h2>Dashboard</h2><div id="metrics" class="metrics"><p>Nessun viaggio calcolato.</p></div><h3>Soste</h3><div id="stops"></div></div></section><section id="garage" class="card hidden"><h2>Garage</h2><div class="twocol"><input id="vName" placeholder="Nome veicolo"><input id="vCons" type="number" value="13" step="0.1" placeholder="km/l"></div><button id="saveVehicle">Salva veicolo</button><div id="vehicles"></div></section><section class="card"><h2>Log</h2><pre id="log"></pre></section></main><script src="app.js"></script></body></html>
