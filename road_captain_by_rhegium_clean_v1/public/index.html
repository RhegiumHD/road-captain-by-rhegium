<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Road Captain by Rhegium</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <div class="kicker">PRIVATE ROUTE PLANNER</div>
      <h1>Road Captain <span>by Rhegium</span></h1>
    </div>
    <div id="status" class="status">Caricamento...</div>
  </header>

  <main class="layout">
    <section class="panel form-panel">
      <h2>Pianificazione</h2>

      <label>Partenza
        <input id="origin" autocomplete="off" placeholder="Inserisci un indirizzo">
        <div id="originSug" class="suggestions"></div>
      </label>

      <div id="waypoints"></div>
      <button id="addWaypoint" class="secondary" type="button">+ Aggiungi tappa intermedia</button>

      <label>Arrivo
        <input id="destination" autocomplete="off" placeholder="Inserisci un indirizzo">
        <div id="destinationSug" class="suggestions"></div>
      </label>

      <div class="grid2">
        <label>Data
          <input id="date" type="date">
        </label>
        <label>Ora
          <input id="time" type="time" value="09:00">
        </label>
      </div>

      <label>Modalità
        <select id="mode">
          <option value="depart">Partenza alle</option>
          <option value="arrive">Arrivo entro</option>
        </select>
      </label>

      <h3>Veicolo</h3>
      <div class="grid3">
        <label>Tipo carburante
          <select id="fuelType">
            <option value="benzina">Benzina</option>
            <option value="diesel">Diesel</option>
            <option value="gpl">GPL</option>
            <option value="metano">Metano</option>
          </select>
        </label>
        <label>Capacità serbatoio (L)
          <input id="tankLiters" type="number" value="15" step="0.1">
        </label>
        <label>Consumo (km/L)
          <input id="consumptionKmL" type="number" value="13" step="0.1">
        </label>
      </div>

      <div class="grid3">
        <label>Autonomia max (km)
          <input id="maxAutonomyKm" type="number" value="200">
        </label>
        <label>Target sosta (km)
          <input id="targetStopKm" type="number" value="150">
        </label>
        <label>Finestra avanti (km)
          <input id="forwardWindowKm" type="number" value="25">
        </label>
      </div>

      <div class="fuel-line">
        <button id="fuelPriceBtn" class="secondary" type="button">Aggiorna prezzo carburante</button>
        <span id="fuelPriceInfo">Prezzo non caricato</span>
      </div>

      <h3>Sosta lunga</h3>
      <div class="grid3">
        <label>Tipo
          <select id="longStopType">
            <option value="">Nessuna</option>
            <option value="pranzo">Pranzo</option>
            <option value="cena">Cena</option>
            <option value="relax">Relax</option>
          </select>
        </label>
        <label>Orario desiderato
          <input id="longStopTime" type="time" value="13:00">
        </label>
        <label>Durata (min)
          <input id="longStopDuration" type="number" value="90">
        </label>
      </div>

      <button id="planBtn" class="primary" type="button">Calcola itinerario</button>
      <div id="log" class="log"></div>
    </section>

    <section class="map-wrap panel">
      <div id="map"></div>
    </section>

    <aside class="panel dashboard">
      <h2>Dashboard</h2>
      <div class="cards">
        <div><span>Km totali</span><strong id="km">—</strong></div>
        <div><span>Durata</span><strong id="duration">—</strong></div>
        <div><span>Soste</span><strong id="stopCount">—</strong></div>
        <div><span>Carburante</span><strong id="fuelCost">—</strong></div>
        <div><span>Pedaggi</span><strong id="tollCost">—</strong></div>
        <div><span>Partenza</span><strong id="departure">—</strong></div>
        <div><span>Arrivo</span><strong id="arrival">—</strong></div>
      </div>

      <h2>Soste previste</h2>
      <div id="stops" class="list muted">Nessun itinerario calcolato.</div>

      <h2>Da vedere lungo il viaggio</h2>
      <div id="pois" class="list muted">Nessun suggerimento.</div>
    </aside>
  </main>

  <script src="/app.js"></script>
</body>
</html>
